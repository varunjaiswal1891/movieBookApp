# ─────────────────────────────────────────────────────────────────────────────
# AWS CodeDeploy AppSpec – deploys the Spring Boot backend onto EC2
# ─────────────────────────────────────────────────────────────────────────────
version: 0.0
os: linux

files:
  - source: movie-booking-backend/target/movie-booking-backend.jar
    destination: /opt/moviebooking/

  - source: .aws/scripts/
    destination: /opt/moviebooking/scripts/

hooks:
  ApplicationStop:
    - location: .aws/scripts/stop_server.sh
      timeout: 60
      runas: root

  BeforeInstall:
    - location: .aws/scripts/before_install.sh
      timeout: 120
      runas: root

  AfterInstall:
    - location: .aws/scripts/after_install.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: .aws/scripts/start_server.sh
      timeout: 120
      runas: root

  ValidateService:
    - location: .aws/scripts/validate_service.sh
      timeout: 60
      runas: root
