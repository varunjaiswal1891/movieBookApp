# ──────────────────────────────────────────────
# Production profile – all secrets injected via env vars / AWS SSM
# ──────────────────────────────────────────────
spring:
  sql:
    init:
      mode: always
      platform: mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:moviebookingdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cors:
    allowed-origin-patterns:
      - "https://*.cloudfront.net"
      - "https://*.amazonaws.com"
  aws:
    enabled: true
    region: ${AWS_REGION:us-east-1}
    s3-bucket: ${S3_BUCKET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.moviebooking: INFO
    org.springframework.security: WARN
