# ──────────────────────────────────────────────
# Local / Dev profile (default) – uses H2 in-memory DB
# ──────────────────────────────────────────────
spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:moviebookingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: embedded

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# JWT – IMPORTANT: rotate this secret via env var in production
app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "https://*.cloudfront.net"
      - "https://*.amazonaws.com"
  jwt:
    secret: ${JWT_SECRET:dev-only-32-char-secret-key-change-me}
    expiration-ms: 86400000   # 24 hours
  aws:
    enabled: false           # Set true in prod when S3 is configured
    region: ${AWS_REGION:us-east-1}
    s3-bucket: ${S3_BUCKET:movie-booking-posters}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.moviebooking: DEBUG
    org.springframework.security: WARN
